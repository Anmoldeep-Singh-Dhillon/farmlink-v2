spring:
  application:
    name: farmlink-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: ${APP_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket:
    equipment: ${MINIO_BUCKET_EQUIPMENT:equipment-images}
    operators: ${MINIO_BUCKET_OPERATORS:operator-images}

geo:
  default-radius-km: ${DEFAULT_SEARCH_RADIUS_KM:10}
  max-radius-km: ${MAX_SEARCH_RADIUS_KM:100}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Actuator ──────────────────────────────────────────────
management:
  health:
    minio:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health