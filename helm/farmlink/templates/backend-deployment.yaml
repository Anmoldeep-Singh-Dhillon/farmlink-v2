apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmlink-backend-deployment
spec:
  replicas: {{ .Values.backend.replicaCount}}
  selector:
    matchLabels:
      app: farmlink-backend
  template:
    metadata:
      labels:
        app: farmlink-backend
    spec:
      containers:
      - name: farmlink-backend
        image: {{ .Values.backend.image.repository}}:{{ .Values.backend.image.tag}}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu}}
            memory: {{ .Values.backend.resources.requests.memory}}
          limits:
              cpu: {{ .Values.backend.resources.limits.cpu}}
              memory: {{ .Values.backend.resources.limits.memory}}
        ports:
        - containerPort: {{ .Values.backend.port}}
        env:
        - name: POSTGRES_HOST
          valueFrom: 
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_PORT
        - name: POSTGRES_NAME
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: JWT_SECRET

        - name: JWT_EXPIRY_MS
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: JWT_EXPIRY_MS

        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MINIO_ENDPOINT

        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_ROOT_USER

        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_ROOT_PASSWORD
              
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 5    # wait before first check
          periodSeconds: 10          # check every 10 seconds

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15   # higher than readiness
          periodSeconds: 20