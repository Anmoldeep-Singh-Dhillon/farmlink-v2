apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmlink-backend-deployment
spec:
  replicas: {{ .Values.backend.replicaCount}}
  selector:
    matchLabels:
      app: farmlink-backend
  template:
    metadata:
      labels:
        app: farmlink-backend
    spec:
      containers:
      - name: farmlink-backend
        image: {{ .Values.backend.image.repository}}:{{ .Values.backend.image.tag}}
        imagePullPolicy: Always
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu}}
            memory: {{ .Values.backend.resources.requests.memory}}
          limits:
              cpu: {{ .Values.backend.resources.limits.cpu}}
              memory: {{ .Values.backend.resources.limits.memory}}
        ports:
        - containerPort: {{ .Values.backend.port}}
        env:
        - name: POSTGRES_HOST
          valueFrom: 
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: JWT_SECRET

        - name: JWT_EXPIRY_MS
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: JWT_EXPIRY_MS

        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MINIO_ENDPOINT

        - name: MINIO_PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MINIO_PUBLIC_URL

        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_ROOT_USER

        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_ROOT_PASSWORD

        - name: DEFAULT_SEARCH_RADIUS_KM
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: DEFAULT_SEARCH_RADIUS_KM

        - name: MAX_SEARCH_RADIUS_KM
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MAX_SEARCH_RADIUS_KM

        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: SPRING_DATASOURCE_URL

        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: SPRING_DATASOURCE_USERNAME

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: SPRING_DATASOURCE_PASSWORD

        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_ACCESS_KEY

        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: farmlink-secret
              key: MINIO_SECRET_KEY

        - name: MINIO_BUCKET_EQUIPMENT
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MINIO_BUCKET_EQUIPMENT

        - name: MINIO_BUCKET_OPERATORS
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: MINIO_BUCKET_OPERATORS

        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: CORS_ALLOWED_ORIGINS

        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: SPRING_PROFILES_ACTIVE

        - name: SPRING_JPA_DDL_AUTO
          valueFrom:
            configMapKeyRef:
              name: farmlink-configmap
              key: SPRING_JPA_DDL_AUTO
              
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60    # wait before first check
          periodSeconds: 10          # check every 10 seconds
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90   # higher than readiness
          periodSeconds: 20
          failureThreshold: 3