apiVersion: v1
kind: Service
metadata:
  name: farmlink-minio-service
spec:
  selector:
    app: farmlink-minio
  ports:
  - name: api
    port: {{ .Values.minio.port }}
    targetPort: {{ .Values.minio.port }}
  - name: console
    port: {{ .Values.minio.consolePort }}
    targetPort: {{ .Values.minio.consolePort }}
  type: ClusterIP