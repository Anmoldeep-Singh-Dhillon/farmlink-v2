{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: farmlink-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: farmlink-backend-service
            port:
              number: {{ .Values.backend.port }}
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: farmlink-frontend-service
            port:
              number: {{ .Values.frontend.port }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: farmlink-frontend-service
            port:
              number: {{ .Values.frontend.port }}
{{- end }}