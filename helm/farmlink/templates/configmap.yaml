apiVersion: v1
kind: ConfigMap
metadata:
  name: farmlist-configmap
data:
  POSTGRES_HOST: farmlist-postgres-service
  POSTGRES_PORT: "{{ .Values.postgres.port }}"
  POSTGRES_DB: "{{ .Values.postgres.database }}"
  JWT_EXPIRY_MS: "{{ .Values.app.jwtExpiryMs }}"
  MINIO_ENDPOINT: "http://farmlist-minio-service:9000"
  MINIO_PUBLIC_URL: "http://farmlist.local:8888/minio-images"
  DEFAULT_SEARCH_RADIUS_KM: "{{ .Values.app.defaultSearchRadiusKm }}"
  MAX_SEARCH_RADIUS_KM: "{{ .Values.app.maxSearchRadiusKm }}"
  APP_PORT: "{{ .Values.backend.port }}"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://farmlist-postgres-service:5432/{{ .Values.postgres.database }}"
  MINIO_BUCKET_EQUIPMENT: "equipment-images"
  MINIO_BUCKET_OPERATORS: "operator-images"
  MINIO_PORT: "{{ .Values.minio.port }}"
  CORS_ALLOWED_ORIGINS: "{{ .Values.app.corsAllowedOrigins}}"
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_JPA_DDL_AUTO: "none"